version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: superbom_postgres
    environment:
      POSTGRES_USER: superbom
      POSTGRES_PASSWORD: superbom_password
      POSTGRES_DB: superbom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: superbom_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # HTTP (UI)
    restart: unless-stopped

volumes:
  postgres_data:
